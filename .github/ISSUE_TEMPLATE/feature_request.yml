name: Feature request
description: Suggest an improvement for the starter
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should this starter make easier?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to add or change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives or tradeoffs worth considering?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the starter minimal.
        - label: This can be documented as an optional recipe if it is too opinionated for the default template.
